<div class="disciplines-card">
  <h3>Disciplines</h3>
  @if (loading) {
    <p>Loading...</p>
  } @else if (disciplines.length) {
    <div class="chart-container">
      <canvas baseChart [data]="pieChartData" [options]="pieChartOptions" [type]="pieChartType"></canvas>
    </div>
  } @else {
    <p>No data available</p>
  }
</div>
