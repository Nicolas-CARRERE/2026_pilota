<div class="stats-summary">
  <div class="stat-card">
    <h4>Total Games</h4>
    <p class="stat-value">{{ stats.total_games }}</p>
  </div>
  <div class="stat-card">
    <h4>Total Players</h4>
    <p class="stat-value">{{ stats.total_players }}</p>
  </div>
  <div class="stat-card">
    <h4>Total Clubs</h4>
    <p class="stat-value">{{ stats.total_clubs }}</p>
  </div>
  <div class="stat-card">
    <h4>Total Competitions</h4>
    <p class="stat-value">{{ stats.total_competitions }}</p>
  </div>
  <div class="stat-card">
    <h4>Total Disciplines</h4>
    <p class="stat-value">{{ stats.total_disciplines }}</p>
  </div>
</div>
