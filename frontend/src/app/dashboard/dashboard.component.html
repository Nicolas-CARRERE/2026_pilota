<div class="dashboard">
  <header class="dashboard-header">
    <h1>Dashboard</h1>
    <button (click)="toggleSidebar()" class="sidebar-toggle" aria-label="Afficher/masquer les filtres">
      {{ sidebarCollapsed ? 'Afficher filtres' : 'Masquer filtres' }}
    </button>
  </header>

  <div class="dashboard-content">
    <aside class="filters-sidebar" [class.sidebar-hidden]="sidebarCollapsed">
      <app-filter-panel></app-filter-panel>
    </aside>

    <main class="dashboard-main" [class.sidebar-open]="!sidebarCollapsed" (click)="onMainClick()">
      <app-stats-summary></app-stats-summary>

      <div class="charts-grid">
        <app-top-players class="chart-card"></app-top-players>
        <app-top-clubs class="chart-card"></app-top-clubs>
        <app-timeline class="chart-card"></app-timeline>
        <app-disciplines class="chart-card"></app-disciplines>
      </div>
    </main>
  </div>
</div>
