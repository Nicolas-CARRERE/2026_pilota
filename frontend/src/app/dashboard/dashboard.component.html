<div class="dashboard-container">
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed">
    <div class="sidebar-header">
      <h2>Filtres</h2>
      <button class="toggle-btn" (click)="toggleSidebar()" aria-label="Toggle sidebar">
        {{ sidebarCollapsed ? '▶' : '◀' }}
      </button>
    </div>
    <app-filter-panel [filters]="filters" (filtersChange)="onFiltersChange($event)"></app-filter-panel>
  </aside>

  <main class="dashboard-content">
    <div class="dashboard-header">
      <h1>Dashboard</h1>
      <p class="subtitle">Statistiques Basque Pelota</p>
    </div>

    <app-stats-summary [filters]="filters"></app-stats-summary>

    <div class="charts-grid">
      <div class="chart-row">
        <app-top-players [filters]="filters" class="chart-card"></app-top-players>
        <app-top-clubs [filters]="filters" class="chart-card"></app-top-clubs>
      </div>

      <div class="chart-row">
        <app-timeline [filters]="filters" class="chart-card"></app-timeline>
        <app-disciplines [filters]="filters" class="chart-card"></app-disciplines>
      </div>
    </div>
  </main>
</div>
