<div class="container">
  <h1>Équipes</h1>
  <p class="lead">Liste des équipes.</p>

  <app-filter
    [config]="filterConfig"
    [filters]="filters"
    (filtersChange)="applyFilters($event)"
  />

  @if (loading) {
    <app-loading></app-loading>
  } @else if (error) {
    <div class="error-message">{{ error }}</div>
  } @else if (teams.length === 0) {
    <p>Aucune équipe trouvée.</p>
  } @else {
    <ul class="team-list">
      @for (t of teams; track t.id) {
        <li class="card team-card">
          <a [routerLink]="['/teams', t.id]" class="team-card-link">
            <span class="team-name">{{ t.name }}</span>
            <span class="team-info">{{ t.shortName || '' }}</span>
          </a>
        </li>
      }
    </ul>
  }
</div>
