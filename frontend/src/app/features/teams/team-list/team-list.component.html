<div class="container">
  <h1>Équipes</h1>
  <p class="lead">Liste des équipes.</p>

  <div class="search-bar">
    <input 
      type="text" 
      class="search-input"
      placeholder="Rechercher une équipe..."
      [value]="searchQuery"
      (input)="onSearchChange($any($event.target).value)"
      aria-label="Rechercher une équipe"
    />
  </div>

  <app-filter
    [config]="filterConfig"
    [filters]="filters"
    (filtersChange)="applyFilters($event)"
    (resetFilters)="onResetFilters()"
  />

  @if (loading) {
    <app-loading></app-loading>
  } @else if (error) {
    <div class="error-message" role="alert">
      <p>{{ error }}</p>
      <button type="button" class="btn btn--outline" (click)="loadTeams()">Réessayer</button>
    </div>
  } @else if (teams.length === 0) {
    <p>Aucune équipe trouvée.</p>
  } @else {
    <ul class="team-list" role="list" aria-label="Liste des équipes">
      @for (t of teams; track t.id) {
        <li class="card team-card" role="listitem">
          <a [routerLink]="['/teams', t.id]" class="team-card-link" [attr.aria-label]="'Voir les détails de ' + t.name">
            <span class="team-name">{{ t.name }}</span>
            <span class="team-info">{{ t.shortName || '' }}</span>
          </a>
        </li>
      }
    </ul>
  }
</div>
