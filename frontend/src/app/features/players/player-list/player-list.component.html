<div class="container">
  <h1>Joueurs</h1>
  <p class="lead">Liste des joueurs.</p>

  <app-filter
    [config]="filterConfig"
    [filters]="filters"
    (filtersChange)="applyFilters($event)"
  />

  @if (loading) {
    <app-loading></app-loading>
  } @else if (error) {
    <div class="error-message" role="alert">
      <p>{{ error }}</p>
      <button type="button" class="btn btn--outline" (click)="loadPlayers()">Réessayer</button>
    </div>
  } @else if (players.length === 0) {
    <p>Aucun joueur trouvé.</p>
  } @else {
    <ul class="player-list" role="list" aria-label="Liste des joueurs">
      @for (p of players; track p.id) {
        <li class="card player-card" role="listitem">
          <a [routerLink]="['/players', p.id]" class="player-card-link" [attr.aria-label]="'Voir le profil de ' + displayName(p)">
            <span class="player-name">{{ displayName(p) }}</span>
            <span class="player-stats">{{ p.gamesPlayed }} parties · {{ p.wins }} victoires</span>
          </a>
        </li>
      }
    </ul>
  }
</div>
