<div class="container">
  <h1>Championnats</h1>
  <p class="lead">Liste des championnats.</p>

  <app-filter
    [config]="filterConfig"
    [filters]="filters"
    (filtersChange)="applyFilters($event)"
  />

  @if (loading) {
    <app-loading></app-loading>
  } @else if (error) {
    <div class="error-message">{{ error }}</div>
  } @else if (competitions.length === 0) {
    <p>Aucun championnat trouvé.</p>
  } @else {
    <ul class="championship-list">
      @for (c of competitions; track c.id) {
        <li class="card championship-card">
          <a [routerLink]="['/championships', c.id]" class="championship-card-link">
            <span class="championship-title">{{ title(c) }}</span>
            <span class="championship-meta">{{ c.startDate | formatDate }}</span>
          </a>
        </li>
      }
    </ul>
  }
</div>
